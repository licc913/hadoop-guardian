spring:
  application:
    name: hadoop-guardian-backend
  datasource:
    url: ${GUARDIAN_DB_URL:jdbc:h2:file:./data/hadoop-guardian-live;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${GUARDIAN_DB_USERNAME:sa}
    password: ${GUARDIAN_DB_PASSWORD:}
    driver-class-name: ${GUARDIAN_DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: ${GUARDIAN_H2_CONSOLE_ENABLED:false}
      path: /h2-console

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

guardian:
  seed:
    enabled: ${GUARDIAN_SEED_ENABLED:false}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  security:
    enabled: ${GUARDIAN_SECURITY_ENABLED:true}
    signing-secret: ${GUARDIAN_SECURITY_SIGNING_SECRET:guardian-dev-secret-change-me}
    token-ttl-hours: ${GUARDIAN_SECURITY_TOKEN_TTL_HOURS:12}
    admin:
      username: ${GUARDIAN_ADMIN_USERNAME:admin}
      password: ${GUARDIAN_ADMIN_PASSWORD:admin123}
      display-name: ${GUARDIAN_ADMIN_DISPLAY_NAME:Platform Admin}
      role: ADMIN
    operator:
      username: ${GUARDIAN_OPERATOR_USERNAME:operator}
      password: ${GUARDIAN_OPERATOR_PASSWORD:operator123}
      display-name: ${GUARDIAN_OPERATOR_DISPLAY_NAME:Operations User}
      role: OPERATOR
  cloudera-manager:
    enabled: ${GUARDIAN_CM_ENABLED:false}
    base-url: ${GUARDIAN_CM_BASE_URL:http://localhost:7180}
    api-version: ${GUARDIAN_CM_API_VERSION:v51}
    username: ${GUARDIAN_CM_USERNAME:admin}
    password: ${GUARDIAN_CM_PASSWORD:admin}
    cluster-name: ${GUARDIAN_CM_CLUSTER_NAME:cluster}
    connect-timeout-ms: ${GUARDIAN_CM_CONNECT_TIMEOUT_MS:10000}
    read-timeout-ms: ${GUARDIAN_CM_READ_TIMEOUT_MS:60000}
  llm:
    enabled: ${GUARDIAN_LLM_ENABLED:false}
    endpoint: ${GUARDIAN_LLM_ENDPOINT:}
    api-key: ${GUARDIAN_LLM_API_KEY:}
    model: ${GUARDIAN_LLM_MODEL:}
    connect-timeout-ms: ${GUARDIAN_LLM_CONNECT_TIMEOUT_MS:10000}
    read-timeout-ms: ${GUARDIAN_LLM_READ_TIMEOUT_MS:30000}
    temperature: ${GUARDIAN_LLM_TEMPERATURE:0.2}
    max-tokens: ${GUARDIAN_LLM_MAX_TOKENS:0}
  cm-log:
    collection-initial-delay-ms: ${GUARDIAN_CM_LOG_COLLECTION_INITIAL_DELAY_MS:10000}
    collection-fixed-delay-ms: ${GUARDIAN_CM_LOG_COLLECTION_FIXED_DELAY_MS:60000}
    retention-hours: ${GUARDIAN_CM_LOG_RETENTION_HOURS:24}
